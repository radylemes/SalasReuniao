// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.1'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Evita gerar pasta build dentro de node_modules (bloqueio comum no OneDrive/Windows).
subprojects { sub ->
    if (sub.name != 'app') {
        sub.layout.buildDirectory.set(rootProject.layout.projectDirectory.dir("build-modules/${sub.name}"))
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
    delete new File(rootProject.projectDir, 'build-modules')
}
