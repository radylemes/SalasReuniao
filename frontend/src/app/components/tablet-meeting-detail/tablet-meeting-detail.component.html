<div class="meeting-detail-overlay" (click)="onBackdropClick()">
  <article class="meeting-detail-panel" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <button type="button" class="meeting-detail-panel__close" (click)="onCloseClick()" aria-label="Fechar">×</button>

    <h2 class="meeting-detail-panel__title">{{ meeting.title }}</h2>

    <div class="meeting-detail-panel__row">
      <svg class="meeting-detail-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 21s-6-5.4-6-10a6 6 0 1112 0c0 4.6-6 10-6 10z" />
        <circle cx="12" cy="11" r="2.5" />
      </svg>
      <span class="meeting-detail-panel__text meeting-detail-panel__text--primary">{{ roomName }}</span>
    </div>

    <div class="meeting-detail-panel__row">
      <svg class="meeting-detail-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <path d="M16 2v4M8 2v4M3 10h18" />
      </svg>
      <span class="meeting-detail-panel__text meeting-detail-panel__text--muted">{{ startLabel }}</span>
    </div>

    <div class="meeting-detail-panel__row">
      <svg class="meeting-detail-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="9" />
        <path d="M12 7v5l3 2" />
      </svg>
      <span class="meeting-detail-panel__text meeting-detail-panel__text--muted">até {{ endLabel }}</span>
    </div>

    @if (meeting.organizer) {
      <div class="meeting-detail-panel__row">
        <svg class="meeting-detail-panel__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span class="meeting-detail-panel__text meeting-detail-panel__text--muted">{{ meeting.organizer }}</span>
      </div>
    }
  </article>
</div>
