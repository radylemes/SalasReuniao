<div class="timeline-grid">
  @for (period of displayPeriods; track period.label) {
    <div class="period-separator">{{ period.label }}</div>
    <div class="time-slots" [style.--columns]="columns">
      @for (slot of period.slots; track slot.startTime + ':' + slot.gridColumnStart) {
        <button
          type="button"
          [class]="getSlotClass(slot)"
          [style.grid-column]="gridColumnStyle(slot)"
          [disabled]="isSlotDisabled(slot)"
          (click)="onSlotClick(slot)"
          [title]="isPastSlot(slot) ? slot.displayTime + ' — horário já passado' : slot.status === 'occupied' ? 'Reservado por: ' + (slot.bookedBy || 'Nao identificado') : slot.displayTime + ' - ' + getSlotDurationLabel(slot)"
        >
          <span class="time-slot-time">{{ slot.displayTime }}</span>
          @if (slot.status === 'available') {
            <span class="time-slot-duration">{{ getSlotDurationLabel(slot) }}</span>
          } @else {
            <span class="time-slot-reserved-by">{{ slot.bookedBy || 'Reservado' }}</span>
          }
        </button>
      }
    </div>
  }
</div>
